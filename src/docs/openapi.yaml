openapi: 3.0.3
info:
  title: Clinic API
  version: 1.0.0
  description: API de clínica com auth, doctors, appointments e dashboard
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Healthcheck
      responses:
        "200":
          description: OK
  /api:
    get:
      summary: API root
      responses:
        "200":
          description: OK
  /api/auth/login:
    post:
      summary: Login
      responses:
        "200":
          description: OK
  /api/auth/register:
    post:
      summary: Register
      responses:
        "201":
          description: Created
  /api/patients:
    get:
      summary: List patients
      responses:
        "200":
          description: OK
    post:
      summary: Create patient
      responses:
        "201":
          description: Created
  /api/doctors:
    get:
      summary: List doctors
      responses:
        "200":
          description: OK
    post:
      summary: Create doctor
      responses:
        "201":
          description: Created
  /api/appointments:
    get:
      summary: List appointments
      responses:
        "200":
          description: OK
    post:
      summary: Create appointment
      responses:
        "201":
          description: Created
  /api/dashboard/stats:
    get:
      summary: Dashboard stats
      responses:
        "200":
          description: OK