name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Prisma generate
        run: npx prisma generate

      - name: Smoke test - start server and hit /health
        shell: pwsh
        run: |
          $env:PORT="3000"
          $env:DATABASE_URL="file:./dev.db"
          $env:JWT_SECRET="ci_secret_key"

          Start-Process -NoNewWindow -FilePath "node" -ArgumentList "src/server.js"
          Start-Sleep -Seconds 2

          $res = Invoke-RestMethod "http://localhost:3000/health"
          if (-not $res.ok) { throw "Healthcheck failed" }
          Write-Host "Healthcheck OK"

      - name: Done
        run: echo "CI passed"