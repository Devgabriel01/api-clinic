services:
  db:
    image: postgres:16
    container_name: api_clinic_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: clinic123
      POSTGRES_DB: clinicdb
    ports:
      - "5432:5432"
    volumes:
      - api_clinic_pg:/var/lib/postgresql/data

volumes:
  api_clinic_pg: